<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        .font-arabic { font-family: 'Amiri', serif; }
        .line-clamp-1 {
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;  
            overflow: hidden;
        }
        /* ИСПРАВЛЕНИЕ 2: Скрытие элементов с x-cloak до момента инициализации Alpine */
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="bg-[#F3F4F9] min-h-screen text-slate-800 font-sans antialiased p-4">

    <header class="max-w-md mx-auto flex items-center justify-between py-4 mb-2">
        <div class="flex items-center gap-3">
            <button class="text-[#1A1D2E] hover:opacity-70 transition-opacity">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <h1 class="text-xl font-bold text-[#1A1D2E]">Глава 110</h1>
        </div>
        <button class="text-[#5665B2] font-semibold text-[15px] hover:text-[#3f4a85]">Выбрать</button>
    </header>

    <div class="max-w-md mx-auto space-y-4 pb-10">

        <article class="bg-white border border-slate-200/60 rounded-2xl p-5 shadow-[0_2px_10px_rgba(0,0,0,0.02)] hover:shadow-[0_4px_15px_rgba(0,0,0,0.05)] transition-all cursor-pointer">
            <div class="flex justify-between items-start gap-4">
                <div class="flex-1 flex flex-col items-start">
                    <div class="mb-3">
                        <span class="text-[40px] font-arabic text-slate-900 leading-none" dir="rtl">جَاءَ</span>
                    </div>
                    <div class="space-y-1.5 w-full">
                        <p class="text-[15px] text-slate-700 leading-snug line-clamp-1">
                            <span class="text-slate-400 font-medium mr-1 text-[13px]">1.</span>Приходить, прибывать, являться
                        </p>
                        <p class="text-[15px] text-slate-700 leading-snug line-clamp-1">
                            <span class="text-slate-400 font-medium mr-1 text-[13px]">2.</span>Подходить (кому على)
                        </p>
                        <p class="text-[15px] text-slate-700 leading-snug line-clamp-1">
                            <span class="text-slate-400 font-medium mr-1 text-[13px]">3.</span>Случаться, получаться
                        </p>
                    </div>
                </div>
                <div class="shrink-0 flex flex-col items-end gap-2 pt-2">
                    <div class="flex flex-col items-end gap-0.5">
                        <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Корень</span>
                        <span class="text-[16px] font-arabic text-slate-400 tracking-[0.2em] mb-1" dir="rtl">ج ي ء</span>
                        <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mt-1">наст.вр</span>
                        <span class="text-[22px] font-arabic text-[#5665B2]" dir="rtl">يَجِيءُ</span>
                    </div>
                </div>
            </div>
            <div class="flex justify-between items-center mt-4 pt-3 border-t border-slate-100">
                <div class="flex items-center gap-2">
                    <span class="bg-[#44D0F0]/15 text-[#008EAA] text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wide">
                        глагол
                    </span>
                    <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mt-[1px]">I порода</span>
                </div>
                <button class="text-slate-300 hover:text-[#5665B2] transition-colors">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                        <path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
                    </svg>
                </button>
            </div>
        </article>

        <article class="bg-white border border-slate-200/60 rounded-2xl p-5 shadow-[0_2px_10px_rgba(0,0,0,0.02)] hover:shadow-[0_4px_15px_rgba(0,0,0,0.05)] transition-all cursor-pointer">
            <div class="flex justify-between items-start gap-4">
                <div class="flex-1 flex flex-col items-start">
                    <div class="mb-3">
                        <span class="text-[40px] font-arabic text-slate-900 leading-none" dir="rtl">مَجْلِس</span>
                    </div>
                    <div class="space-y-1.5 w-full">
                        <p class="text-[15px] text-slate-700 leading-snug line-clamp-1">
                            <span class="text-slate-400 font-medium mr-1 text-[13px]">1.</span>Место (где сидят)
                        </p>
                        <p class="text-[15px] text-slate-700 leading-snug line-clamp-1">
                            <span class="text-slate-400 font-medium mr-1 text-[13px]">2.</span>Место, зал заседаний
                        </p>
                        <p class="text-[15px] text-slate-700 leading-snug line-clamp-1">
                            <span class="text-slate-400 font-medium mr-1 text-[13px]">3.</span>Заседание, собрание
                        </p>
                    </div>
                </div>
                <div class="shrink-0 flex flex-col items-end gap-2 pt-2">
                    <div class="flex flex-col items-end gap-0.5">
                        <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider">Корень</span>
                        <span class="text-[16px] font-arabic text-slate-400 tracking-[0.2em] mb-1" dir="rtl">ج ل س</span>
                        <span class="text-[10px] text-slate-400 uppercase font-bold tracking-wider mt-1">мн.ч</span>
                        <span class="text-[22px] font-arabic text-[#5665B2]" dir="rtl">مَجَالِس</span>
                    </div>
                </div>
            </div>
            <div class="flex justify-between items-center mt-4 pt-3 border-t border-slate-100">
                <span class="bg-[#BFF044]/20 text-[#4D6600] text-[10px] font-bold px-2.5 py-1 rounded-md uppercase tracking-wide">
                    имя
                </span>
                <button class="text-[#5665B2] transition-colors">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24">
                        <path d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z"></path>
                    </svg>
                </button>
            </div>
        </article>

    </div>

    <div class="fixed bottom-0 left-0 w-full z-50 pointer-events-none">
        <div class="max-w-md mx-auto relative h-full w-full" x-data="{ openDial: false }">
            
            <div class="absolute bottom-24 right-4 flex flex-col items-end pointer-events-auto z-50">
                
                <div x-show="openDial" 
                     @click="openDial = false" 
                     x-transition:enter="transition-opacity ease-out duration-300"
                     x-transition:enter-start="opacity-0"
                     x-transition:enter-end="opacity-100"
                     x-transition:leave="transition-opacity ease-in duration-200"
                     x-transition:leave-start="opacity-100"
                     x-transition:leave-end="opacity-0"
                     class="fixed inset-0 bg-slate-900/40 backdrop-blur-[2px] z-40"
                     x-cloak>
                </div>

                <div x-show="openDial" 
                     x-transition:enter="transition ease-out duration-200 transform"
                     x-transition:enter-start="opacity-0 translate-y-8 scale-90"
                     x-transition:enter-end="opacity-100 translate-y-0 scale-100"
                     x-transition:leave="transition ease-in duration-150 transform"
                     x-transition:leave-start="opacity-100 translate-y-0 scale-100"
                     x-transition:leave-end="opacity-0 translate-y-8 scale-90"
                     class="flex flex-col items-end gap-3 mb-4 z-50 relative"
                     x-cloak>
                    
                    <button class="flex items-center gap-3 bg-white border border-slate-100 text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-full shadow-lg transition-colors active:scale-95">
                        <span class="text-[14px] font-medium tracking-wide">Тренировка</span>
                        <div class="bg-[#F3F4F9] p-2 rounded-full text-[#44D0F0]">
                            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"></path></svg>
                        </div>
                    </button>

                    <button class="flex items-center gap-3 bg-white border border-slate-100 text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-full shadow-lg transition-colors active:scale-95">
                        <span class="text-[14px] font-medium tracking-wide">Тест</span>
                        <div class="bg-[#F3F4F9] p-2 rounded-full text-[#8DA0E2]">
                            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"></path></svg>
                        </div>
                    </button>

                    <button class="flex items-center gap-3 bg-white border border-slate-100 text-slate-700 hover:bg-slate-50 px-4 py-2 rounded-full shadow-lg transition-colors active:scale-95">
                        <span class="text-[14px] font-medium tracking-wide">Учить</span>
                        <div class="bg-[#F3F4F9] p-2 rounded-full text-[#5665B2]">
                            <svg class="w-4 h-4 fill-current" viewBox="0 0 24 24"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm0 14H8V4h12v12z"></path></svg>
                        </div>
                    </button>

                </div>

                <button @click="openDial = !openDial" 
                        class="w-14 h-14 rounded-full flex items-center justify-center transition-all duration-300 z-50 relative active:scale-90"
                        :class="openDial ? 'bg-white text-[#5665B2] border border-slate-100 shadow-md rotate-90' : 'bg-[#5665B2] hover:bg-[#7B8AE6] text-white shadow-[0_8px_25px_rgba(86,101,178,0.4)]'">
                    
                    <svg x-show="!openDial" class="w-6 h-6 fill-current ml-1" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"></path></svg>
                    <svg x-show="openDial" x-cloak class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"></path></svg>
                </button>
            </div>

            <nav class="absolute bottom-0 w-full h-[72px] bg-white border-t border-gray-200 flex justify-around items-center pointer-events-auto pb-safe">
                <button class="flex flex-col items-center gap-1 text-[#5665B2]">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M12 3l8 6v12h-5v-7H9v7H4V9l8-6z"></path></svg>
                </button>
                <button class="flex flex-col items-center gap-1 text-[#A2A6B9] hover:text-[#5665B2] transition-colors">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M21 21.5l-5.18-5.18A7.95 7.95 0 0018 10c0-4.42-3.58-8-8-8s-8 3.58-8 8 3.58 8 8 8c1.6 0 3.08-.47 4.32-1.28L19.5 22 21 21.5zM10 16c-3.31 0-6-2.69-6-6s2.69-6 6-6 6 2.69 6 6-2.69 6-6 6z"></path></svg>
                </button>
                <button class="flex flex-col items-center gap-1 text-[#A2A6B9] hover:text-[#5665B2] transition-colors">
                    <svg class="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"></path></svg>
                </button>
            </nav>

        </div>
    </div>

</body>
</html>
